# MOC Instruction Viewer — Nginx 配置
# 放到 /etc/nginx/sites-available/moc-viewer 然后 ln -s 到 sites-enabled

server {
    listen 80;
    server_name _;  # 替换为你的域名，例如 ldr.example.com

    # 前端静态文件
    root /var/www/moc-viewer;
    index index.html;

    # 日志
    access_log /var/log/nginx/moc-viewer-access.log;
    error_log  /var/log/nginx/moc-viewer-error.log;

    # API 代理到 FastAPI 后端
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 大文件上传支持（如后续需要上传模型）
        client_max_body_size 50m;
    }

    # SPA 路由：/viewer/:id 回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
    }
}
