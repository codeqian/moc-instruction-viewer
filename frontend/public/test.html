<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LDrawLoader Debug</title>
<style>
  body { margin:0; background:#1a1a2e; color:#eee; font-family:monospace; }
  canvas { display:block; }
  #log { position:fixed; top:0; left:0; padding:10px; font-size:12px; max-width:100%; max-height:40%; overflow-y:auto; background:rgba(0,0,0,0.8); z-index:10; }
  .ok { color:#4f4; }
  .err { color:#f44; }
  .warn { color:#fa0; }
  #controls { position:fixed; bottom:10px; left:10px; z-index:10; }
  button { margin:2px; padding:6px 12px; }
</style>
</head>
<body>
<div id="log"></div>
<div id="controls">
  <button id="btn-mpd">Test: Packed MPD</button>
  <button id="btn-ldr">Test: Raw LDR</button>
  <button id="btn-clear">Clear Log</button>
</div>
<script type="importmap">
{
  "imports": {
    "three": "/node_modules/three/build/three.module.js",
    "three/addons/": "/node_modules/three/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { LDrawLoader } from "three/addons/loaders/LDrawLoader.js";

const logEl = document.getElementById("log");
let entryCount = 0;

function logMsg(msg, cls) {
  entryCount++;
  const div = document.createElement("div");
  div.className = cls || "";
  div.textContent = `[${entryCount}] ${msg}`;
  logEl.appendChild(div);
  logEl.scrollTop = logEl.scrollHeight;
  console.log(msg);
}

// Setup scene once
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 2000);
camera.position.set(30, 20, 40);
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const key = new THREE.DirectionalLight(0xffffff, 0.8);
key.position.set(10, 20, 15);
scene.add(key);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(0, 10, 0);
controls.update();

let currentModel = null;

function clearModel() {
  if (currentModel) {
    scene.remove(currentModel);
    currentModel = null;
  }
}

function fitCamera(obj) {
  const box = new THREE.Box3().setFromObject(obj);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  logMsg(`Bounds: size=(${size.x.toFixed(1)},${size.y.toFixed(1)},${size.z.toFixed(1)})`, "ok");
  const d = Math.max(size.x, size.y, size.z) * 1.8;
  camera.position.set(center.x+d*0.6, center.y+d*0.5, center.z+d*0.7);
  controls.target.copy(center);
  controls.update();
}

function loadModel(url, label) {
  return new Promise((resolve, reject) => {
    clearModel();
    const loader = new LDrawLoader();
    loader.partsLibraryPath = "/api/ldraw/";

    logMsg(`Loading: ${label}`, "warn");
    const t0 = performance.now();

    loader.load(
      url,
      (group) => {
        const t = (performance.now() - t0).toFixed(0);
        logMsg(`✓ LOADED in ${t}ms`, "ok");
        scene.add(group);
        currentModel = group;
        fitCamera(group);
        resolve(group);
      },
      (xhr) => {
        if (xhr.total > 0) {
          logMsg(`  Download: ${Math.round(xhr.loaded/xhr.total*100)}% (${xhr.loaded}/${xhr.total})`);
        } else if (xhr.loaded > 0) {
          logMsg(`  Download: ${xhr.loaded} bytes`);
        }
      },
      (err) => {
        logMsg(`✗ ERROR: ${err.message || err}`, "err");
        reject(err);
      }
    );
  });
}

// Button handlers
document.getElementById("btn-mpd").addEventListener("click", () => {
  logMsg("--- Test: Packed MPD ---", "warn");
  loadModel("/api/models/10001/packed", "Packed MPD");
});

document.getElementById("btn-ldr").addEventListener("click", () => {
  logMsg("--- Test: Raw LDR ---", "warn");
  // Serve LDR directly via API
  loadModel("/api/ldraw/source/10001.ldr", "Raw LDR (via parts lib)");
});

document.getElementById("btn-clear").addEventListener("click", () => {
  logEl.innerHTML = "";
  entryCount = 0;
  logMsg("Log cleared");
});

// Also need to add source dir to the ldraw serving
// For now test raw LDR from a direct API endpoint

// Render loop
(function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
})();

logMsg("Ready — click a test button above", "ok");
</script>
</body>
</html>
