<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Single Part Test</title></head>
<body>
<h3 id="status">Loading...</h3>
<canvas id="c" width="800" height="600" style="background:#1a1a2e"></canvas>

<script type="importmap">
{"imports":{
  "three":"/node_modules/three/build/three.module.js",
  "three/addons/":"/node_modules/three/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { LDrawLoader } from "three/addons/loaders/LDrawLoader.js";

const status = document.getElementById("status");

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
const camera = new THREE.PerspectiveCamera(45, 800/600, 0.1, 1000);
camera.position.set(5, 5, 10);
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const d = new THREE.DirectionalLight(0xffffff, 0.8);
d.position.set(10, 20, 15);
scene.add(d);

const renderer = new THREE.WebGLRenderer({canvas:document.getElementById("c"),antialias:true});
renderer.setSize(800,600);
const controls = new OrbitControls(camera, renderer.domElement);
controls.update();

function animate(){requestAnimationFrame(animate);controls.update();renderer.render(scene,camera);}
animate();

// Create a minimal inline LDraw model: just a single red 2x4 brick
const simpleModel = `0 Simple test
0 Name: test
0 Author: test
0 BFC CERTIFY CCW
1 4 0 0 0 1 0 0 0 1 0 0 0 1 3001.dat
`;

// Use parse() with inline text
const loader = new LDrawLoader();
loader.partsLibraryPath = "/api/ldraw/";

status.textContent = "Parsing...";
loader.parse(
  simpleModel,
  (group) => {
    status.textContent = "✅ Loaded!";
    scene.add(group);
    const box = new THREE.Box3().setFromObject(group);
    const c = box.getCenter(new THREE.Vector3());
    const s = box.getSize(new THREE.Vector3());
    const d = Math.max(s.x,s.y,s.z)*1.5;
    camera.position.set(c.x+d*0.6, c.y+d*0.5, c.z+d*0.7);
    controls.target.copy(c);
  },
  (err) => { status.textContent = "❌ " + err; }
);
</script>
</body></html>
