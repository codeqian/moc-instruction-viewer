<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Quick Test</title></head>
<body>
<h2>1. FileLoader test</h2>
<div id="out1">...</div>
<h2>2. LDrawLoader test</h2>
<div id="out2">...</div>
<h2>3. Simple model</h2>
<canvas id="c" width="800" height="600" style="background:#1a1a2e"></canvas>

<script type="importmap">
{"imports":{
  "three":"/node_modules/three/build/three.module.js",
  "three/addons/":"/node_modules/three/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from "three";
import { LDrawLoader } from "three/addons/loaders/LDrawLoader.js";
import { LineMaterial } from "three/addons/lines/LineMaterial.js";

// Test 1: FileLoader directly
const fl = new THREE.FileLoader();
fl.setPath("/api/ldraw/");
fl.load(
  "parts/3001.dat",
  (text) => { document.getElementById("out1").innerHTML = "✅ Loaded 3001.dat: " + text.substring(0,100); },
  (xhr) => { document.getElementById("out1").textContent = "Progress: " + (xhr.total > 0 ? Math.round(xhr.loaded/xhr.total*100)+"%" : xhr.loaded+" bytes"); },
  (err) => { document.getElementById("out1").innerHTML = "❌ ERROR: " + err; }
);

// Test 2: LDrawLoader.loadAsync via fetchData
const loader = new LDrawLoader();
loader.partsLibraryPath = "/api/ldraw/";
loader.setConditionalLineMaterial(LineMaterial);

// Try directly calling internal methods via a trick
const pc = loader.partsCache;
const start = Date.now();
loader.load(
  "/api/models/10001/packed",
  (group) => {
    document.getElementById("out2").innerHTML = "✅ Model loaded in " + (Date.now()-start) + "ms";
  },
  (xhr) => {
    if (xhr.total > 0) {
      document.getElementById("out2").textContent = "Loading: " + Math.round(xhr.loaded/xhr.total*100) + "%";
    }
  },
  (err) => {
    document.getElementById("out2").innerHTML = "❌ ERROR: " + (err.message || err);
    console.error(err);
  }
);
</script>
</body></html>
